<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Atividades Complementares — Zootecnia</title>
<style>
  :root{
    --verde-escuro:#1f3d2b;
    --verde-medio:#3a6b4a;
    --verde-claro:#e9f1ea;
    --teal:#2e6e6e;
    --dourado:#c9a227;
    --bege:#faf8f3;
    --tinta:#1c2420;
    --tinta-suave:#5b6a60;
    --linha:#dadfd9;
    --vermelho:#a4423a;
    --display: 'Iowan Old Style','Georgia',serif;
    --corpo: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'SFMono-Regular', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bege);
    color:var(--tinta);
    font-family:var(--corpo);
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:980px;margin:0 auto;padding:28px 20px 80px;}

  /* HEADER */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:18px;margin-bottom:26px;border-bottom:2px solid var(--verde-escuro);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:40px;height:40px;border-radius:10px;
    background:linear-gradient(135deg,var(--verde-escuro),var(--teal));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:var(--display);font-size:19px;font-weight:700;flex-shrink:0;
  }
  .brand-text .eyebrow{
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:600;
  }
  .brand-text h1{font-family:var(--display);font-size:21px;margin:2px 0 0;color:var(--verde-escuro);font-weight:700;}
  .switch-role{
    font-size:12.5px;color:var(--tinta-suave);background:none;border:1px solid var(--linha);
    padding:7px 12px;border-radius:7px;cursor:pointer;font-family:var(--corpo);
  }
  .switch-role:hover{border-color:var(--verde-medio);color:var(--verde-escuro);}

  /* LOGIN SCREEN */
  .login-wrap{display:flex;justify-content:center;padding:50px 10px;}
  .login-card{
    max-width:420px;width:100%;background:#fff;border:1px solid var(--linha);
    border-radius:14px;padding:34px 30px;box-shadow:0 1px 3px rgba(31,61,43,.06);
  }
  .login-card h2{font-family:var(--display);color:var(--verde-escuro);margin:0 0 6px;font-size:22px;}
  .login-card p.sub{color:var(--tinta-suave);font-size:13.5px;margin:0 0 24px;line-height:1.5;}
  .role-tabs{display:flex;gap:8px;margin-bottom:22px;}
  .role-tab{
    flex:1;padding:10px;text-align:center;border-radius:8px;border:1px solid var(--linha);
    cursor:pointer;font-size:13.5px;color:var(--tinta-suave);font-weight:600;
  }
  .role-tab.active{background:var(--verde-escuro);color:#fff;border-color:var(--verde-escuro);}

  label{display:block;font-size:12.5px;font-weight:600;color:var(--verde-escuro);margin:14px 0 6px;}
  input,select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--linha);border-radius:8px;
    font-size:14px;font-family:var(--corpo);background:#fff;color:var(--tinta);
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde-medio);box-shadow:0 0 0 3px rgba(58,107,74,.12);}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:11px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;
    cursor:pointer;font-family:var(--corpo);
  }
  .btn-primary{background:var(--verde-escuro);color:#fff;width:100%;margin-top:22px;}
  .btn-primary:hover{background:var(--verde-medio);}
  .btn-ghost{background:none;border:1px solid var(--linha);color:var(--tinta);}
  .btn-ghost:hover{border-color:var(--verde-medio);}
  .btn-gold{background:var(--dourado);color:var(--verde-escuro);}
  .btn-danger{background:#fff;color:var(--vermelho);border:1px solid var(--vermelho);}
  .btn-danger:hover{background:var(--vermelho);color:#fff;}
  .btn-sm{padding:7px 12px;font-size:12.5px;}
  .err{color:var(--vermelho);font-size:12.5px;margin-top:10px;}

  /* NAV TABS within role */
  .nav-tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--linha);}
  .nav-tab{
    padding:10px 16px;font-size:13.5px;font-weight:600;color:var(--tinta-suave);
    cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .nav-tab.active{color:var(--verde-escuro);border-bottom-color:var(--dourado);}

  /* CARD */
  .card{
    background:#fff;border:1px solid var(--linha);border-radius:12px;padding:24px;margin-bottom:18px;
  }
  .card h3{font-family:var(--display);color:var(--verde-escuro);margin:0 0 4px;font-size:18px;}
  .card .desc{color:var(--tinta-suave);font-size:13px;margin:0 0 18px;}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:640px){.row2{grid-template-columns:1fr;}}

  .file-drop{
    border:1.5px dashed var(--linha);border-radius:8px;padding:18px;text-align:center;
    font-size:13px;color:var(--tinta-suave);cursor:pointer;
  }
  .file-drop.has-file{border-color:var(--verde-medio);background:var(--verde-claro);color:var(--verde-escuro);}

  /* PROGRESS / STATS */
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
  @media(max-width:640px){.stat-grid{grid-template-columns:1fr;}}
  .stat-box{background:#fff;border:1px solid var(--linha);border-radius:12px;padding:18px;}
  .stat-num{font-family:var(--display);font-size:30px;color:var(--verde-escuro);font-weight:700;line-height:1;}
  .stat-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--tinta-suave);margin-top:6px;font-weight:600;}

  .bar-track{height:10px;border-radius:6px;background:var(--linha);overflow:hidden;margin:8px 0 4px;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--verde-medio),var(--teal));border-radius:6px;}
  .bar-fill.ok{background:linear-gradient(90deg,var(--verde-medio),var(--dourado));}

  .cat-list{display:flex;flex-direction:column;gap:9px;}
  .cat-row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .cat-name{flex:1;color:var(--tinta);}
  .cat-vals{font-family:var(--mono);font-size:12px;color:var(--tinta-suave);min-width:70px;text-align:right;}
  .cat-bar{flex:2;height:6px;border-radius:4px;background:var(--linha);overflow:hidden;}
  .cat-bar-fill{height:100%;background:var(--teal);}

  /* TABLE */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--tinta-suave);padding:8px 10px;border-bottom:1.5px solid var(--linha);font-weight:600;
  }
  td{padding:10px;border-bottom:1px solid var(--linha);vertical-align:top;}
  tr:last-child td{border-bottom:none;}

  .badge{
    display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.03em;
  }
  .badge-pendente{background:#f6efd9;color:#8a6d10;}
  .badge-aprovado{background:var(--verde-claro);color:var(--verde-escuro);}
  .badge-recusado{background:#f6e2e0;color:var(--vermelho);}

  .empty{
    text-align:center;padding:40px 20px;color:var(--tinta-suave);font-size:13.5px;
  }
  .empty .ico{font-size:28px;margin-bottom:10px;}

  /* MODAL */
  .modal-bg{
    position:fixed;inset:0;background:rgba(28,36,32,.45);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:20px;
  }
  .modal{
    background:#fff;border-radius:14px;max-width:700px;width:100%;padding:28px;
    max-height:85vh;overflow-y:auto;
  }
  .modal h3{font-family:var(--display);color:var(--verde-escuro);margin:0 0 16px;font-size:19px;}
  .field-view{margin-bottom:10px;font-size:13.5px;}
  .field-view b{color:var(--verde-escuro);display:inline-block;min-width:110px;}
  .pdf-link{
    display:inline-flex;align-items:center;gap:7px;color:var(--teal);font-weight:600;font-size:13.5px;
    text-decoration:none;border:1px solid var(--teal);padding:8px 12px;border-radius:8px;margin-top:8px;
  }
  .pdf-link:hover{background:var(--verde-claro);}
  .pdf-header{
    display:flex;align-items:center;justify-content:space-between;margin-top:14px;margin-bottom:8px;
  }
  .pdf-filename{font-size:13px;color:var(--tinta);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dl-icon{
    flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;
    width:32px;height:32px;border-radius:7px;border:1px solid var(--teal);color:var(--teal);
    text-decoration:none;font-size:15px;margin-left:10px;
  }
  .dl-icon:hover{background:var(--verde-claro);}
  .pdf-frame{
    width:100%;height:420px;border:1px solid var(--linha);border-radius:8px;background:#f4f4f2;
  }
  .modal-actions{display:flex;gap:10px;margin-top:22px;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--verde-escuro);
    color:#fff;padding:12px 20px;border-radius:8px;font-size:13.5px;z-index:60;box-shadow:0 4px 14px rgba(0,0,0,.2);
  }
  .loading{text-align:center;padding:40px;color:var(--tinta-suave);font-size:13.5px;}
  .small-note{font-size:11.5px;color:var(--tinta-suave);margin-top:6px;line-height:1.5;}
  .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .chip{
    padding:6px 13px;border-radius:20px;border:1px solid var(--linha);font-size:12.5px;
    cursor:pointer;color:var(--tinta-suave);font-weight:600;
  }
  .chip.active{background:var(--verde-escuro);color:#fff;border-color:var(--verde-escuro);}
</style>
</head>

<script>

<div id="root" class="app"></div>

<script>
const CATEGORIAS = [
  {nome:"Participação em eventos e palestras", teto:100},
  {nome:"Viagens ou Visitas Técnicas", teto:80},
  {nome:"Cursos de Extensão", teto:100},
  {nome:"Disciplinas Optativas em outros cursos", teto:120},
  {nome:"Monitoria", teto:120},
  {nome:"Pesquisa Institucional", teto:80},
  {nome:"Apresentação de trabalhos em eventos científicos", teto:80},
  {nome:"Artigos Publicados", teto:120},
  {nome:"Outras Atividades Didático-Pedagógicas Culturais e Comunitárias", teto:80},
  {nome:"Estágio extracurricular", teto:120},
  {nome:"Concursos de Monografias", teto:80},
  {nome:"Projeto Experimental de consultoria", teto:100},
  {nome:"Trabalhos de Análises Interdisciplinares", teto:100},
  {nome:"Trabalhos de Conteúdo Específico", teto:80},
];
const HORAS_MINIMAS = 240;
const MIN_CATEGORIAS = 3;
const SENHA_COORDENADOR = "eduvale2026";

const MAPA_TIPO_IMPORT = {
  'eventos e palestras': 'Participação em eventos e palestras',
  'evento e palestra': 'Participação em eventos e palestras',
  'curso de extensão': 'Cursos de Extensão',
  'cursos de extensão': 'Cursos de Extensão',
  'curso a distancia': 'Cursos de Extensão',
  'curso a distância': 'Cursos de Extensão',
  'estagio extracurricular': 'Estágio extracurricular',
  'estágio extracurricular': 'Estágio extracurricular',
  'extracurricular': 'Estágio extracurricular',
  'vivencia extracurricular': 'Estágio extracurricular',
  'vivência extracurricular': 'Estágio extracurricular',
  'viagem ou visita técnica': 'Viagens ou Visitas Técnicas',
  'viagens ou visitas técnicas': 'Viagens ou Visitas Técnicas',
  'visita técnica': 'Viagens ou Visitas Técnicas',
  'visita tecnica': 'Viagens ou Visitas Técnicas',
  'apresentação de trabalho': 'Apresentação de trabalhos em eventos científicos',
  'apresentação de trabalhos': 'Apresentação de trabalhos em eventos científicos',
  'artigo publicado': 'Artigos Publicados',
  'artigos publicados': 'Artigos Publicados',
  'monitoria': 'Monitoria',
  'pesquisa institucional': 'Pesquisa Institucional',
  'disciplinas optativas': 'Disciplinas Optativas em outros cursos',
  'concursos de monografias': 'Concursos de Monografias',
};

function parseDataExcel(v){
  if(v == null) return '';
  if(typeof v === 'number'){
    const d = XLSX.SSF.parse_date_code(v);
    if(d) return String(d.y) + '-' + String(d.m).padStart(2,'0') + '-' + String(d.d).padStart(2,'0');
  }
  return String(v).trim();
}

const root = document.getElementById('root');
let state = {
  screen: 'login', // login | aluno | coordenador
  role: 'aluno',
  alunoTab: 'enviar', // enviar | minhashoras
  coordTab: 'pendentes', // pendentes | todos
  matricula: '',
  nome: '',
  submissoes: [],
  loading: true,
  toast: null,
  modalItem: null,
  modalMotivo: '',
  modalCargaReconhecida: '',
  loginErr: '',
  coordSenhaInput: '',
  filtroStatus: 'todos',
  exportFiltro: 'todos',
};

function setState(patch){ state = {...state, ...patch}; render(); }
function showToast(msg){ setState({toast: msg}); setTimeout(()=>{ if(state.toast===msg) setState({toast:null}); }, 3000); }

function uid(){ return 'sub_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

async function loadSubmissoes(){
  try{
    const snap = await db.collection('submissoes').orderBy('timestamp','desc').get();
    const items = snap.docs.map(d => ({id:d.id, ...d.data()}));
    setState({submissoes: items, loading:false});
  }catch(e){
    console.error(e);
    setState({submissoes:[], loading:false});
  }
}

async function salvarSubmissao(item){
  const ref = item.id ? db.collection('submissoes').doc(item.id) : db.collection('submissoes').doc();
  const id = ref.id;
  await ref.set({...item, id});
  return id;
}

async function atualizarSubmissao(id, patch){
  await db.collection('submissoes').doc(id).update(patch);
}

async function uploadPdf(file, submissaoId){
  const ref = fbStorage.ref().child('comprovantes/' + submissaoId + '/' + file.name);
  await ref.put(file);
  return await ref.getDownloadURL();
}

function alunoKey(s){
  if(s.matricula && String(s.matricula).trim()) return 'm:' + String(s.matricula).trim();
  return 'n:' + String(s.nome||'').trim().toLowerCase();
}

function cappedHoursByCategory(submissoes, matricula){
  const aprovados = submissoes.filter(s => s.matricula === matricula && s.status === 'aprovado');
  const byCat = {};
  CATEGORIAS.forEach(c => byCat[c.nome] = 0);
  aprovados.forEach(s => {
    const carga = Number(s.cargaReconhecida != null ? s.cargaReconhecida : s.cargaHoraria) || 0;
    byCat[s.tipo] = (byCat[s.tipo] || 0) + carga;
  });
  CATEGORIAS.forEach(c => { byCat[c.nome] = Math.min(byCat[c.nome], c.teto); });
  return byCat;
}

function cappedHoursByCategoryForGroup(submissoes, key){
  const aprovados = submissoes.filter(s => s.status === 'aprovado' && alunoKey(s) === key);
  const byCat = {};
  CATEGORIAS.forEach(c => byCat[c.nome] = 0);
  aprovados.forEach(s => {
    const carga = Number(s.cargaReconhecida != null ? s.cargaReconhecida : s.cargaHoraria) || 0;
    byCat[s.tipo] = (byCat[s.tipo] || 0) + carga;
  });
  CATEGORIAS.forEach(c => { byCat[c.nome] = Math.min(byCat[c.nome], c.teto); });
  return byCat;
}

function totalHoras(byCat){
  return Object.values(byCat).reduce((a,b)=>a+b,0);
}

function categoriasCompletas(byCat){
  return Object.values(byCat).filter(v => v > 0).length;
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// ---------- RENDER ----------
function render(){
  if(state.screen === 'login') return renderLogin();
  root.innerHTML = '';
  const wrap = document.createElement('div');

  wrap.appendChild(renderTopbar());

  if(state.loading){
    const l = document.createElement('div');
    l.className='loading';
    l.textContent='Carregando dados...';
    wrap.appendChild(l);
    root.appendChild(wrap);
    return;
  }

  if(state.screen === 'aluno') wrap.appendChild(renderAluno());
  if(state.screen === 'coordenador') wrap.appendChild(renderCoordenador());

  root.appendChild(wrap);

  if(state.modalItem) root.appendChild(renderModal());
  if(state.toast){
    const t = document.createElement('div');
    t.className='toast';
    t.textContent = state.toast;
    root.appendChild(t);
  }
}

function renderTopbar(){
  const bar = document.createElement('div');
  bar.className='topbar';
  bar.innerHTML = `
    <div class="brand">
      <div class="brand-mark">Z</div>
      <div class="brand-text">
        <div class="eyebrow">Eduvale · Zootecnia</div>
        <h1>Atividades Complementares</h1>
      </div>
    </div>
  `;
  const btn = document.createElement('button');
  btn.className='switch-role';
  btn.textContent = state.screen === 'aluno' ? 'Sair' : 'Sair';
  btn.onclick = () => setState({screen:'login', matricula:'', nome:'', coordSenhaInput:'', loginErr:''});
  bar.appendChild(btn);
  return bar;
}

function renderLogin(){
  root.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className='login-wrap';
  wrap.innerHTML = `
    <div class="login-card">
      <h2>Acessar sistema</h2>
      <p class="sub">Controle de horas complementares do curso de Zootecnia — Eduvale.</p>
      <div class="role-tabs">
        <div class="role-tab ${state.role==='aluno'?'active':''}" id="tab-aluno">Sou aluno(a)</div>
        <div class="role-tab ${state.role==='coordenador'?'active':''}" id="tab-coord">Sou coordenador(a)</div>
      </div>
      <div id="login-fields"></div>
      <div class="err" id="login-err">${state.loginErr || ''}</div>
      <button class="btn btn-primary" id="btn-entrar">Entrar</button>
    </div>
  `;
  root.appendChild(wrap);

  document.getElementById('tab-aluno').onclick = () => setState({role:'aluno', loginErr:''});
  document.getElementById('tab-coord').onclick = () => setState({role:'coordenador', loginErr:''});

  const fields = document.getElementById('login-fields');
  if(state.role === 'aluno'){
    fields.innerHTML = `
      <label>Matrícula</label>
      <input id="in-matricula" placeholder="Ex: 2023045" value="${state.matricula}">
      <label>Nome completo</label>
      <input id="in-nome" placeholder="Seu nome completo" value="${state.nome}">
    `;
  } else {
    fields.innerHTML = `
      <label>Senha de coordenação</label>
      <input id="in-senha" type="password" placeholder="Senha de acesso">
    `;
  }

  document.getElementById('btn-entrar').onclick = async () => {
    if(state.role === 'aluno'){
      const matricula = document.getElementById('in-matricula').value.trim();
      const nome = document.getElementById('in-nome').value.trim();
      if(!matricula || !nome){ setState({loginErr:'Preencha matrícula e nome para continuar.'}); return; }
      setState({screen:'aluno', matricula, nome, loginErr:'', loading:true, alunoTab:'enviar'});
      await loadSubmissoes();
    } else {
      const senha = document.getElementById('in-senha').value;
      if(senha !== SENHA_COORDENADOR){ setState({loginErr:'Senha incorreta.'}); return; }
      setState({screen:'coordenador', loginErr:'', loading:true, coordTab:'pendentes'});
      await loadSubmissoes();
    }
  };
}

// ---------- ALUNO ----------
function renderAluno(){
  const wrap = document.createElement('div');

  const tabs = document.createElement('div');
  tabs.className='nav-tabs';
  const tabEnviar = document.createElement('div');
  tabEnviar.className = 'nav-tab ' + (state.alunoTab==='enviar'?'active':'');
  tabEnviar.textContent = 'Enviar atividade';
  tabEnviar.onclick = () => setState({alunoTab:'enviar'});
  const tabHoras = document.createElement('div');
  tabHoras.className = 'nav-tab ' + (state.alunoTab==='minhashoras'?'active':'');
  tabHoras.textContent = 'Minhas horas';

function renderImportarCoord(){
  const card = document.createElement('div');
  card.className='card';
  card.innerHTML = `
    <h3>Importar planilha já preenchida</h3>
    <p class="desc">Envie um arquivo .xlsx com abas contendo as colunas: Nome do Aluno, Tema, Data, Local, Carga Horária e Tipo da Atividade. As linhas serão importadas como atividades já <b>aprovadas</b>, sem matrícula preenchida (você adiciona depois manualmente) e sem PDF anexado.</p>
    <div class="file-drop" id="imp-drop">Clique para selecionar o arquivo .xlsx</div>
    <input type="file" id="imp-file" accept=".xlsx,.xls" style="display:none">
    <div id="imp-status" class="small-note"></div>
  `;

  const drop = card.querySelector('#imp-drop');
  const fileInput = card.querySelector('#imp-file');
  const status = card.querySelector('#imp-status');
  drop.onclick = () => fileInput.click();

  fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if(!file) return;
    status.textContent = 'Lendo planilha...';
    try{
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array', cellDates:false});
      let importados = 0, semHoras = 0, semTipo = [];
      const sheetNames = wb.SheetNames.filter(n => /ingress/i.test(n) || /atividade/i.test(n));
      const alvo = sheetNames.length ? sheetNames : wb.SheetNames;

      for(const sn of alvo){
        const ws = wb.Sheets[sn];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
        let nomeAtual = null;
        for(let i=1;i<rows.length;i++){
          const r = rows[i];
          if(!r || r.length === 0) continue;
          const [nome, tema, data, local, carga, tipo] = r;
          if(nome && String(nome).trim().toUpperCase() === 'TOTAL') continue;
          if(nome) nomeAtual = String(nome).trim();
          if(!tema || !nomeAtual) continue;
          let cargaNum = typeof carga === 'number' ? carga : parseFloat(String(carga||'').replace(',','.'));
          if(!cargaNum || cargaNum <= 0){ semHoras++; continue; }
          const tipoKey = String(tipo||'').trim().toLowerCase();
          const tipoMapeado = MAPA_TIPO_IMPORT[tipoKey];
          if(!tipoMapeado){ semTipo.push(String(tema)); continue; }

          const item = {
            id: uid(),
            matricula: '',
            nome: nomeAtual,
            tema: String(tema).trim(),
            dataIni: parseDataExcel(data),
            dataFim: parseDataExcel(data),
            local: local ? String(local).trim() : '',
            cargaHoraria: cargaNum,
            tipo: tipoMapeado,
            pdfUrl: '',
            pdfName: '',
            status: 'aprovado',
            motivoRecusa: '',
            cargaReconhecida: cargaNum,
            timestamp: Date.now(),
          };
          await salvarSubmissao(item);
          importados++;
        }
      }

      let msg = `Importação concluída: ${importados} atividade(s) adicionada(s) como aprovadas.`;
      if(semHoras) msg += ` ${semHoras} linha(s) ignorada(s) por carga horária ausente ou inválida.`;
      if(semTipo.length) msg += ` ${semTipo.length} linha(s) com tipo de atividade não reconhecido (não importadas) — confira: ${semTipo.slice(0,5).join('; ')}${semTipo.length>5?'...':''}`;
      status.textContent = msg;
      showToast('Planilha importada com sucesso.');
      setState({loading:true});
      await loadSubmissoes();
    }catch(e){
      status.textContent = 'Erro ao ler a planilha. Confira o formato do arquivo.';
    }
  };

  return card;
}

      'Tema': s.tema,
      'Data Início': s.dataIni,

      'Carga Horária Reconhecida': s.cargaReconhecida != null ? s.cargaReconhecida : '',
      'Tipo da Atividade': s.tipo,
      'Status': s.status,
      'Motivo da Recusa': s.motivoRecusa || '',
    }));
    const ws = XLSX.utils.json_to_sheet(linhas);
    ws['!cols'] = [{wch:12},{wch:28},{wch:32},{wch:12},{wch:12},{wch:22},{wch:14},{wch:16},{wch:32},{wch:12},{wch:28}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Atividades');
    const dataStr = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `atividades_complementares_${dataStr}.xlsx`);
    showToast('Planilha gerada com sucesso.');
  };

  return card;
}

function renderAlunosCoord(){
  const wrap = document.createElement('div');
  const grupos = {};
  state.submissoes.forEach(s => {
    const key = alunoKey(s);
    if(!grupos[key]) grupos[key] = s;
  });
  const keys = Object.keys(grupos);
  if(keys.length === 0){
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `<div class="empty"><div class="ico">👥</div>Nenhum aluno enviou atividades ainda.</div>`;
    wrap.appendChild(card);
    return wrap;
  }
  keys.sort((a,b) => grupos[a].nome.localeCompare(grupos[b].nome));
  keys.forEach(key => {
    const sub = grupos[key];
    const byCat = cappedHoursByCategoryForGroup(state.submissoes, key);
    const total = totalHoras(byCat);
    const numCat = categoriasCompletas(byCat);
    const pct = Math.min(100, Math.round((total/HORAS_MINIMAS)*100));
    const ok = total >= HORAS_MINIMAS && numCat >= MIN_CATEGORIAS;
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div>
          <h3>${sub.nome} <span style="font-size:12px;color:var(--tinta-suave);font-weight:400">${sub.matricula ? '— ' + sub.matricula : '— sem matrícula'}</span></h3>
          <p class="desc">${total}h de ${HORAS_MINIMAS}h · ${numCat}/${MIN_CATEGORIAS} categorias ${ok ? '· <b style="color:var(--verde-medio)">Requisitos atingidos</b>' : ''}</p>
        </div>
        <button class="btn btn-danger btn-sm" data-key="${key}" data-nome="${sub.nome.replace(/"/g,'&quot;')}">Excluir aluno</button>
      </div>
      <div class="bar-track"><div class="bar-fill ${ok?'ok':''}" style="width:${pct}%"></div></div>
    `;
    wrap.appendChild(card);
  });

  wrap.querySelectorAll('button[data-key]').forEach(b => {
    b.onclick = async () => {
      const confirmado = confirm(`Excluir todas as atividades de "${b.dataset.nome}"? Essa ação não pode ser desfeita.`);
      if(!confirmado) return;
      const key = b.dataset.key;
      const alvo = state.submissoes.filter(s => alunoKey(s) === key);
      try{
        b.disabled = true; b.textContent = 'Excluindo...';
        for(const s of alvo){
          await db.collection('submissoes').doc(s.id).delete();
          if(s.pdfUrl){
            try{ await fbStorage.refFromURL(s.pdfUrl).delete(); }catch(e){}
          }
        }
        showToast('Aluno e suas atividades foram excluídos.');
        setState({loading:true});
        await loadSubmissoes();
      }catch(e){
        console.error(e);
        showToast('Erro ao excluir. Tente novamente.');
      }
    };
  });

  return wrap;
}

    <div class="field-view"><b>Período</b> ${item.dataIni} a ${item.dataFim}</div>
    <div class="field-view"><b>Local</b> ${item.local}</div>
    <div class="field-view"><b>Carga solicitada</b> ${item.cargaHoraria}h</div>
    <div class="field-view"><b>Status atual</b> <span class="badge badge-${item.status}">${item.status}</span></div>

    ${item.pdfUrl ? `
    <div class="pdf-header">
      <span class="pdf-filename">📄 ${item.pdfName}</span>
      <a class="dl-icon" href="${item.pdfUrl}" download="${item.pdfName}" target="_blank" title="Baixar PDF">⬇</a>
    </div>
    <iframe class="pdf-frame" src="${item.pdfUrl}"></iframe>
    ` : `<div class="small-note" style="margin-top:14px">Sem PDF anexado (registro importado de planilha).</div>`}

    <div style="margin-top:18px">
      <label>Carga horária reconhecida</label>
      <input id="m-carga" type="number" value="${state.modalCargaReconhecida}" min="0">
      <label>Motivo (necessário se recusar)</label>
      <textarea id="m-motivo" rows="2" placeholder="Ex: documento ilegível, carga horária divergente...">${state.modalMotivo}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="m-fechar">Fechar</button>
      <button class="btn btn-danger btn-sm" id="m-recusar">Recusar</button>
      <button class="btn btn-gold btn-sm" id="m-aprovar">Aprovar</button>
    </div>
  `;
  bg.appendChild(modal);

  modal.querySelector('#m-fechar').onclick = () => setState({modalItem:null});
  modal.querySelector('#m-carga').oninput = (e) => { state.modalCargaReconhecida = e.target.value; };
  modal.querySelector('#m-motivo').oninput = (e) => { state.modalMotivo = e.target.value; };

  modal.querySelector('#m-aprovar').onclick = async () => {
    const carga = Number(modal.querySelector('#m-carga').value);
    await atualizarSubmissao(item.id, {status:'aprovado', cargaReconhecida: carga, motivoRecusa:''});
    showToast('Atividade aprovada.');
    setState({modalItem:null, loading:true});
    await loadSubmissoes();
  };
  modal.querySelector('#m-recusar').onclick = async () => {
    const motivo = modal.querySelector('#m-motivo').value.trim();
    if(!motivo){ alert('Informe o motivo da recusa.'); return; }
    await atualizarSubmissao(item.id, {status:'recusado', motivoRecusa: motivo});
    showToast('Atividade recusada.');
    setState({modalItem:null, loading:true});
    await loadSubmissoes();
  };

  return bg;
}

render();
</script>
</body>
</html>
