<title>Atividades Complementares — Zootecnia</title>
<style>
  :root{
    --verde-escuro:#1f3d2b;
    --verde-medio:#3a6b4a;
    --verde-claro:#e9f1ea;
    --teal:#2e6e6e;
    --dourado:#c9a227;
    --bege:#faf8f3;
    --tinta:#1c2420;
    --tinta-suave:#5b6a60;
    --linha:#dadfd9;
    --vermelho:#a4423a;
    --display: 'Iowan Old Style','Georgia',serif;
    --corpo: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'SFMono-Regular', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bege);
    color:var(--tinta);
    font-family:var(--corpo);
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:980px;margin:0 auto;padding:28px 20px 80px;}

  /* HEADER */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:18px;margin-bottom:26px;border-bottom:2px solid var(--verde-escuro);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:40px;height:40px;border-radius:10px;
    background:linear-gradient(135deg,var(--verde-escuro),var(--teal));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:var(--display);font-size:19px;font-weight:700;flex-shrink:0;
  }
  .brand-text .eyebrow{
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:600;
  }
  .brand-text h1{font-family:var(--display);font-size:21px;margin:2px 0 0;color:var(--verde-escuro);font-weight:700;}
  .switch-role{
    font-size:12.5px;color:var(--tinta-suave);background:none;border:1px solid var(--linha);
    padding:7px 12px;border-radius:7px;cursor:pointer;font-family:var(--corpo);
  }
  .switch-role:hover{border-color:var(--verde-medio);color:var(--verde-escuro);}

  /* LOGIN SCREEN */
  .login-wrap{display:flex;justify-content:center;padding:50px 10px;}
  .login-card{
    max-width:420px;width:100%;background:#fff;border:1px solid var(--linha);
    border-radius:14px;padding:34px 30px;box-shadow:0 1px 3px rgba(31,61,43,.06);
  }
  .login-card h2{font-family:var(--display);color:var(--verde-escuro);margin:0 0 6px;font-size:22px;}
  .login-card p.sub{color:var(--tinta-suave);font-size:13.5px;margin:0 0 24px;line-height:1.5;}
  .role-tabs{display:flex;gap:8px;margin-bottom:22px;}
  .role-tab{
    flex:1;padding:10px;text-align:center;border-radius:8px;border:1px solid var(--linha);
    cursor:pointer;font-size:13.5px;color:var(--tinta-suave);font-weight:600;
  }
  .role-tab.active{background:var(--verde-escuro);color:#fff;border-color:var(--verde-escuro);}

  label{display:block;font-size:12.5px;font-weight:600;color:var(--verde-escuro);margin:14px 0 6px;}
  input,select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--linha);border-radius:8px;
    font-size:14px;font-family:var(--corpo);background:#fff;color:var(--tinta);
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde-medio);box-shadow:0 0 0 3px rgba(58,107,74,.12);}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:11px 18px;border-radius:8px;border:none;font-size:14px;font-weight:600;
    cursor:pointer;font-family:var(--corpo);
  }
  .btn-primary{background:var(--verde-escuro);color:#fff;width:100%;margin-top:22px;}
  .btn-primary:hover{background:var(--verde-medio);}
  .btn-ghost{background:none;border:1px solid var(--linha);color:var(--tinta);}
  .btn-ghost:hover{border-color:var(--verde-medio);}
  .btn-gold{background:var(--dourado);color:var(--verde-escuro);}
  .btn-danger{background:#fff;color:var(--vermelho);border:1px solid var(--vermelho);}
  .btn-danger:hover{background:var(--vermelho);color:#fff;}
  .btn-sm{padding:7px 12px;font-size:12.5px;}
  .err{color:var(--vermelho);font-size:12.5px;margin-top:10px;}

  /* NAV TABS within role */
  .nav-tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--linha);}
  .nav-tab{
    padding:10px 16px;font-size:13.5px;font-weight:600;color:var(--tinta-suave);
    cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .nav-tab.active{color:var(--verde-escuro);border-bottom-color:var(--dourado);}

  /* CARD */
  .card{
    background:#fff;border:1px solid var(--linha);border-radius:12px;padding:24px;margin-bottom:18px;
  }
  .card h3{font-family:var(--display);color:var(--verde-escuro);margin:0 0 4px;font-size:18px;}
  .card .desc{color:var(--tinta-suave);font-size:13px;margin:0 0 18px;}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:640px){.row2{grid-template-columns:1fr;}}

  .file-drop{

    font-size:13px;color:var(--tinta-suave);cursor:pointer;
  }
  .file-drop.has-file{border-color:var(--verde-medio);background:var(--verde-claro);color:var(--verde-escuro);}

  @media(max-width:640px){.stat-grid{grid-template-columns:1fr;}}

  .stat-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--tinta-suave);margin-top:6px;font-weight:600;}

  .bar-track{height:10px;border-radius:6px;background:var(--linha);overflow:hidden;margin:8px 0 4px;}

  .bar-fill.ok{background:linear-gradient(90deg,var(--verde-medio),var(--dourado));}

  .cat-list{display:flex;flex-direction:column;gap:9px;}
  .cat-row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .cat-name{flex:1;color:var(--tinta);}
  .cat-vals{font-family:var(--mono);font-size:12px;color:var(--tinta-suave);min-width:70px;text-align:right;}
  .cat-bar{flex:2;height:6px;border-radius:4px;background:var(--linha);overflow:hidden;}
  .cat-bar-fill{height:100%;background:var(--teal);}

  /* TABLE */

  th{

    color:var(--tinta-suave);padding:8px 10px;border-bottom:1.5px solid var(--linha);font-weight:600;

  tr:last-child td{border-bottom:none;}

  .badge-aprovado{background:var(--verde-claro);color:var(--verde-escuro);}

<script>
/* =====================================================================
   COLE AQUI O ID DO CLIENTE OAUTH DO GOOGLE CLOUD (Passo 1 do tutorial)
   Console Cloud > APIs e serviços > Credenciais > ID do cliente OAuth
   ===================================================================== */
const GOOGLE_CLIENT_ID = "1038295694568-s2gkog75odugku9m8jhkvlpvv39r1lfv.apps.googleusercontent.com";

const DRIVE_SCOPES = "https://www.googleapis.com/auth/drive.file";
let driveAccessToken = null;
let driveTokenClient = null;

function initDriveClient(){
  if(!window.google || !GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === 'COLE_AQUI') return;
  driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPES,
    callback: (resp) => {
      if(resp.error){ console.error('Drive auth error:', resp); return; }
      driveAccessToken = resp.access_token;
      showToast('Google Drive conectado com sucesso!');
    },
  });
}
window.addEventListener('load', () => setTimeout(initDriveClient, 1500));

async function getOrCreateDriveFolder(nome){
  const searchResp = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${nome}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
    { headers: { Authorization: 'Bearer ' + driveAccessToken } }
  );
  const searchData = await searchResp.json();
  if(searchData.files && searchData.files.length > 0) return searchData.files[0].id;
  const createResp = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + driveAccessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: nome, mimeType: 'application/vnd.google-apps.folder' }),
  });
  const createData = await createResp.json();
  return createData.id;
}

async function uploadPdfToDrive(pdfUrl, nomeAluno, nomeArquivo){
  if(!driveAccessToken) return false;
  try{
    // Usar o SDK do Firebase Storage para baixar o arquivo (evita bloqueio de CORS)
    const storageRef = fbStorage.refFromURL(pdfUrl);
    const MAX_SIZE = 10 * 1024 * 1024; // 10MB
    const bytes = await storageRef.getBytes(MAX_SIZE);
    const pdfBlob = new Blob([bytes], { type: 'application/pdf' });

    const folderId = await getOrCreateDriveFolder('Atividades Complementares — Zootecnia');
    const nomeNoArquivo = `${nomeAluno} — ${nomeArquivo}`;
    const metadata = { name: nomeNoArquivo, parents: [folderId] };
    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
    formData.append('file', pdfBlob, nomeArquivo);
    const uploadResp = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      { method: 'POST', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: formData }
    );
    return uploadResp.ok;
  }catch(e){
    console.error('Erro ao enviar pro Drive:', e);
    return false;
  }
}
</script>

function parseDataExcel(v){
  if(v == null) return '';
  if(typeof v === 'number'){
    const d = XLSX.SSF.parse_date_code(v);
    if(d) return String(d.y) + '-' + String(d.m).padStart(2,'0') + '-' + String(d.d).padStart(2,'0');
  }
  return String(v).trim();
}

function uid(){ return 'sub_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

async function loadSubmissoes(){
  try{
    const snap = await db.collection('submissoes').orderBy('timestamp','desc').get();
    const items = snap.docs.map(d => ({id:d.id, ...d.data()}));
    setState({submissoes: items, loading:false});
  }catch(e){
    console.error(e);
    setState({submissoes:[], loading:false});
  }
}

async function salvarSubmissao(item){
  const ref = item.id ? db.collection('submissoes').doc(item.id) : db.collection('submissoes').doc();
  const id = ref.id;
  await ref.set({...item, id});
  return id;
}

async function atualizarSubmissao(id, patch){
  await db.collection('submissoes').doc(id).update(patch);
}

async function uploadPdf(file, submissaoId){
  const ref = fbStorage.ref().child('comprovantes/' + submissaoId + '/' + file.name);
  await ref.put(file);
  return await ref.getDownloadURL();
}

function normalizar(str){
  return String(str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

function alunoKey(s){
  if(s.matricula && String(s.matricula).trim()) return 'm:' + String(s.matricula).trim();
  return 'n:' + normalizar(s.nome);
}

function resolverAlunoCadastrado(s){
  // Se já tem matrícula cadastrada, retorna direto
  if(s.matricula && String(s.matricula).trim()){
    return ALUNOS_CADASTRADOS[String(s.matricula).trim()] || null;
  }
  // Se não tem matrícula, tenta cruzar pelo nome
  const nomeNorm = normalizar(s.nome);
  const mat = Object.keys(ALUNOS_CADASTRADOS).find(k => normalizar(ALUNOS_CADASTRADOS[k].nome) === nomeNorm);
  return mat ? ALUNOS_CADASTRADOS[mat] : null;
}

function resolverAnoIngresso(s){
  if(s.anoIngresso) return s.anoIngresso;
  const cad = resolverAlunoCadastrado(s);
  return cad ? cad.anoIngresso : '';
}

function resolverMatricula(s){
  if(s.matricula && String(s.matricula).trim()) return String(s.matricula).trim();
  const nomeNorm = normalizar(s.nome);
  return Object.keys(ALUNOS_CADASTRADOS).find(k => normalizar(ALUNOS_CADASTRADOS[k].nome) === nomeNorm) || '';
}
  if(s.matricula && String(s.matricula).trim()) return 'm:' + String(s.matricula).trim();
  return 'n:' + String(s.nome||'').trim().toLowerCase();
}

function pertenceAoAluno(s, matricula, nome){
  // Registro com matrícula preenchida: compara pela matrícula
  if(s.matricula && String(s.matricula).trim()){
    return String(s.matricula).trim() === String(matricula).trim();
  }
  // Registro sem matrícula (importado da planilha): compara pelo nome (sem acento, minúsculo)
  const normalizar = str => str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  return normalizar(s.nome||'') === normalizar(nome||'');
}

function cappedHoursByCategory(submissoes, matricula, nome){
  const aprovados = submissoes.filter(s => pertenceAoAluno(s, matricula, nome) && s.status === 'aprovado');
  const byCat = {};
  CATEGORIAS.forEach(c => byCat[c.nome] = 0);
  aprovados.forEach(s => {
    const carga = Number(s.cargaReconhecida != null ? s.cargaReconhecida : s.cargaHoraria) || 0;
    byCat[s.tipo] = (byCat[s.tipo] || 0) + carga;
  });
  CATEGORIAS.forEach(c => { byCat[c.nome] = Math.min(byCat[c.nome], c.teto); });
  return byCat;
}

function cappedHoursByCategoryForGroup(submissoes, key){
  const aprovados = submissoes.filter(s => s.status === 'aprovado' && alunoKey(s) === key);
  const byCat = {};
  CATEGORIAS.forEach(c => byCat[c.nome] = 0);
  aprovados.forEach(s => {
    const carga = Number(s.cargaReconhecida != null ? s.cargaReconhecida : s.cargaHoraria) || 0;
    byCat[s.tipo] = (byCat[s.tipo] || 0) + carga;
  });
  CATEGORIAS.forEach(c => { byCat[c.nome] = Math.min(byCat[c.nome], c.teto); });
  return byCat;
}

function totalHoras(byCat){
  return Object.values(byCat).reduce((a,b)=>a+b,0);
}

function categoriasCompletas(byCat){
  return Object.values(byCat).filter(v => v > 0).length;
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function renderImportarCoord(){
  const card = document.createElement('div');
  card.className='card';
  card.innerHTML = `
    <h3>Importar planilha já preenchida</h3>
    <p class="desc">Envie um arquivo .xlsx com abas contendo as colunas: Nome do Aluno, Tema, Data, Local, Carga Horária e Tipo da Atividade. As linhas serão importadas como atividades já <b>aprovadas</b>, sem matrícula preenchida (você adiciona depois manualmente) e sem PDF anexado.</p>
    <div class="file-drop" id="imp-drop">Clique para selecionar o arquivo .xlsx</div>
    <input type="file" id="imp-file" accept=".xlsx,.xls" style="display:none">
    <div id="imp-status" class="small-note"></div>
  `;

  const drop = card.querySelector('#imp-drop');
  const fileInput = card.querySelector('#imp-file');
  const status = card.querySelector('#imp-status');
  drop.onclick = () => fileInput.click();

  fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if(!file) return;
    status.textContent = 'Lendo planilha...';
    try{
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array', cellDates:false});
      let importados = 0, semHoras = 0, semTipo = [];
      const sheetNames = wb.SheetNames.filter(n => /ingress/i.test(n) || /atividade/i.test(n));
      const alvo = sheetNames.length ? sheetNames : wb.SheetNames;

      for(const sn of alvo){
        const ws = wb.Sheets[sn];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
        let nomeAtual = null;
        for(let i=1;i<rows.length;i++){
          const r = rows[i];
          if(!r || r.length === 0) continue;
          const [nome, tema, data, local, carga, tipo] = r;
          if(nome && String(nome).trim().toUpperCase() === 'TOTAL') continue;
          if(nome) nomeAtual = String(nome).trim();
          if(!tema || !nomeAtual) continue;
          let cargaNum = typeof carga === 'number' ? carga : parseFloat(String(carga||'').replace(',','.'));
          if(!cargaNum || cargaNum <= 0){ semHoras++; continue; }
          const tipoKey = String(tipo||'').trim().toLowerCase();
          const tipoMapeado = MAPA_TIPO_IMPORT[tipoKey];
          if(!tipoMapeado){ semTipo.push(String(tema)); continue; }

          const item = {
            id: uid(),
            matricula: '',
            nome: nomeAtual,
            tema: String(tema).trim(),
            dataIni: parseDataExcel(data),
            dataFim: parseDataExcel(data),
            local: local ? String(local).trim() : '',
            cargaHoraria: cargaNum,
            tipo: tipoMapeado,
            pdfUrl: '',
            pdfName: '',
            status: 'aprovado',
            motivoRecusa: '',
            cargaReconhecida: cargaNum,
            timestamp: Date.now(),
          };
          await salvarSubmissao(item);
          importados++;
        }
      }

      let msg = `Importação concluída: ${importados} atividade(s) adicionada(s) como aprovadas.`;
      if(semHoras) msg += ` ${semHoras} linha(s) ignorada(s) por carga horária ausente ou inválida.`;
      if(semTipo.length) msg += ` ${semTipo.length} linha(s) com tipo de atividade não reconhecido (não importadas) — confira: ${semTipo.slice(0,5).join('; ')}${semTipo.length>5?'...':''}`;
      status.textContent = msg;
      showToast('Planilha importada com sucesso.');
      setState({loading:true});
      await loadSubmissoes();
    }catch(e){
      status.textContent = 'Erro ao ler a planilha. Confira o formato do arquivo.';
    }
  };

  return card;
}

      'Data Fim': s.dataFim,
      'Local': s.local,
      'Carga Horária Solicitada': s.cargaHoraria,
      'Carga Horária Reconhecida': s.cargaReconhecida != null ? s.cargaReconhecida : '',
      'Tipo da Atividade': s.tipo,
      'Status': s.status,
      'Motivo da Recusa': s.motivoRecusa || '',
    }));
    const ws = XLSX.utils.json_to_sheet(linhas);
    ws['!cols'] = [{wch:12},{wch:28},{wch:32},{wch:12},{wch:12},{wch:22},{wch:14},{wch:16},{wch:32},{wch:12},{wch:28}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Atividades');
    const dataStr = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `atividades_complementares_${dataStr}.xlsx`);
    showToast('Planilha gerada com sucesso.');
  };

  return card;
}

// ---------- COORDENADOR ----------
function renderCoordenador(){
  const wrap = document.createElement('div');

  const tabs = document.createElement('div');
  tabs.className='nav-tabs';
  const pendentesCount = state.submissoes.filter(s=>s.status==='pendente').length;
  const ctPend = document.createElement('div');
  ctPend.className = 'nav-tab ' + (state.coordTab==='pendentes'?'active':'');
  ctPend.textContent = 'Pendentes' + (pendentesCount>0 ? ` (${pendentesCount})` : '');
  ctPend.onclick = () => setState({coordTab:'pendentes'});
  const ctTodos = document.createElement('div');
  ctTodos.className = 'nav-tab ' + (state.coordTab==='todos'?'active':'');
  ctTodos.textContent = 'Todos os envios';
  ctTodos.onclick = () => setState({coordTab:'todos'});
  const ctAlunos = document.createElement('div');
  ctAlunos.className = 'nav-tab ' + (state.coordTab==='alunos'?'active':'');
  ctAlunos.textContent = 'Progresso por aluno';
  ctAlunos.onclick = () => setState({coordTab:'alunos'});
  const ctImportar = document.createElement('div');
  ctImportar.className = 'nav-tab ' + (state.coordTab==='importar'?'active':'');
  ctImportar.textContent = 'Importar planilha';
  ctImportar.onclick = () => setState({coordTab:'importar'});
  const ctExportar = document.createElement('div');
  ctExportar.className = 'nav-tab ' + (state.coordTab==='exportar'?'active':'');
  ctExportar.textContent = 'Baixar planilha';
  ctExportar.onclick = () => setState({coordTab:'exportar'});
  tabs.appendChild(ctPend); tabs.appendChild(ctTodos); tabs.appendChild(ctAlunos); tabs.appendChild(ctImportar); tabs.appendChild(ctExportar);
  wrap.appendChild(tabs);

  const content = document.createElement('div');
  if(state.coordTab === 'pendentes') content.appendChild(renderListaCoord(state.submissoes.filter(s=>s.status==='pendente')));
  else if(state.coordTab === 'todos') content.appendChild(renderTodosCoord());
  else if(state.coordTab === 'alunos') content.appendChild(renderAlunosCoord());
  else if(state.coordTab === 'importar') content.appendChild(renderImportarCoord());
  else content.appendChild(renderExportarCoord());
  wrap.appendChild(content);

  return wrap;
}

function renderTodosCoord(){
  const wrap = document.createElement('div');

  // Filtro por status
  const filterBar = document.createElement('div');
  filterBar.className='filter-bar';
  filterBar.style.marginBottom='8px';
  const opts = ['todos','pendente','aprovado','recusado'];
  opts.forEach(o => {
    const chip = document.createElement('div');
    chip.className = 'chip ' + (state.filtroStatus===o?'active':'');
    chip.textContent = o==='todos' ? 'Todos os status' : o.charAt(0).toUpperCase()+o.slice(1);
    chip.onclick = () => setState({filtroStatus: o, coordTab:'todos'});
    filterBar.appendChild(chip);
  });
  wrap.appendChild(filterBar);

  // Filtro por ano de ingresso
  const anosDisponiveis = [...new Set(
    state.submissoes.map(s => s.anoIngresso || resolverAnoIngresso(s)).filter(Boolean)
  )].sort((a,b) => b - a);

  if(anosDisponiveis.length > 0){
    const filterAno = document.createElement('div');
    filterAno.className='filter-bar';
    filterAno.style.marginBottom='16px';
    const chipTodos = document.createElement('div');
    chipTodos.className = 'chip ' + (!state.filtroAnoTodos ? 'active' : '');
    chipTodos.textContent = 'Todos os anos';
    chipTodos.onclick = () => setState({filtroAnoTodos: '', coordTab:'todos'});
    filterAno.appendChild(chipTodos);
    anosDisponiveis.forEach(ano => {
      const chip = document.createElement('div');
      chip.className = 'chip ' + (state.filtroAnoTodos == ano ? 'active' : '');
      chip.textContent = ano;
      chip.onclick = () => setState({filtroAnoTodos: ano, coordTab:'todos'});
      filterAno.appendChild(chip);
    });
    wrap.appendChild(filterAno);
  }

  let lista = state.submissoes;
  if(state.filtroStatus !== 'todos') lista = lista.filter(s => s.status === state.filtroStatus);
  if(state.filtroAnoTodos){
    lista = lista.filter(s => String(s.anoIngresso || resolverAnoIngresso(s)) === String(state.filtroAnoTodos));
  }
  wrap.appendChild(renderListaCoord(lista));
  return wrap;
}

function renderListaCoord(lista){
  const card = document.createElement('div');
  card.className='card';
  if(lista.length === 0){
    card.innerHTML = `<div class="empty"><div class="ico">✅</div>Nenhum envio encontrado nesta visão.</div>`;
    return card;
  }
  const table = document.createElement('table');
  table.innerHTML = `
    <thead><tr><th>Aluno</th><th>Ano</th><th>Tema</th><th>Tipo</th><th>Carga</th><th>Status</th><th></th></tr></thead>
    <tbody>
      ${lista.map(s => {
        const mat = resolverMatricula(s);
        const ano = resolverAnoIngresso(s);
        return `
        <tr>
          <td>${s.nome}<br><span style="color:var(--tinta-suave);font-size:11px">${mat || 'sem matrícula'}</span></td>
          <td>${ano || '—'}</td>
          <td>${s.tema}</td>
          <td>${s.tipo}</td>
          <td>${s.cargaHoraria}h</td>
          <td><span class="badge badge-${s.status}">${s.status}</span></td>
          <td><button class="btn btn-ghost btn-sm" data-id="${s.id}">Ver</button></td>
        </tr>`;
      }).join('')}
    </tbody>
  `;
  card.appendChild(table);
  table.querySelectorAll('button[data-id]').forEach(b => {
    b.onclick = () => {
      const item = state.submissoes.find(s => s.id === b.dataset.id);
      setState({modalItem: item, modalMotivo: item.motivoRecusa || '', modalCargaReconhecida: item.cargaReconhecida != null ? item.cargaReconhecida : item.cargaHoraria});
    };
  });
  return card;
}

function renderAlunosCoord(){
  const wrap = document.createElement('div');
  const grupos = {};
  state.submissoes.forEach(s => {
    const key = alunoKey(s);
    if(!grupos[key]) grupos[key] = s;
  });
  const keys = Object.keys(grupos);
  if(keys.length === 0){
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `<div class="empty"><div class="ico">👥</div>Nenhum aluno enviou atividades ainda.</div>`;
    wrap.appendChild(card);
    return wrap;
  }

  // Filtro por ano de ingresso
  const anosDisponiveis = [...new Set(
    Object.values(grupos).map(s => resolverAnoIngresso(s)).filter(Boolean)
  )].sort((a,b) => b - a);

  const filtroBar = document.createElement('div');
  filtroBar.className = 'filter-bar';
  filtroBar.style.marginBottom = '16px';

  const chipTodos = document.createElement('div');
  chipTodos.className = 'chip ' + (!state.filtroAnoIngresso ? 'active' : '');
  chipTodos.textContent = 'Todos os anos';
  chipTodos.onclick = () => setState({coordTab:'alunos', filtroAnoIngresso: ''});
  filtroBar.appendChild(chipTodos);

  anosDisponiveis.forEach(ano => {
    const chip = document.createElement('div');
    chip.className = 'chip ' + (state.filtroAnoIngresso == ano ? 'active' : '');
    chip.textContent = ano;
    chip.onclick = () => setState({coordTab:'alunos', filtroAnoIngresso: ano});
    filtroBar.appendChild(chip);
  });
  wrap.appendChild(filtroBar);

  keys.sort((a,b) => grupos[a].nome.localeCompare(grupos[b].nome));
  const keysFiltrados = state.filtroAnoIngresso
    ? keys.filter(k => String(resolverAnoIngresso(grupos[k])) === String(state.filtroAnoIngresso))
    : keys;

  if(keysFiltrados.length === 0){
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `<div class="empty"><div class="ico">👥</div>Nenhum aluno encontrado para o ano selecionado.</div>`;
    wrap.appendChild(card);
    return wrap;
  }

  keysFiltrados.forEach(key => {
    const sub = grupos[key];
    const byCat = cappedHoursByCategoryForGroup(state.submissoes, key);
    const total = totalHoras(byCat);
    const numCat = categoriasCompletas(byCat);
    const pct = Math.min(100, Math.round((total/HORAS_MINIMAS)*100));
    const ok = total >= HORAS_MINIMAS && numCat >= MIN_CATEGORIAS;
    const card = document.createElement('div');
    card.className='card';
    const matResolvida = resolverMatricula(sub);
    const anoResolvido = resolverAnoIngresso(sub);
    card.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div>
          <h3>${sub.nome} <span style="font-size:12px;color:var(--tinta-suave);font-weight:400">${matResolvida ? '— ' + matResolvida : '— sem matrícula'}${anoResolvido ? ' · ingresso ' + anoResolvido : ''}</span></h3>
          <p class="desc">${total}h de ${HORAS_MINIMAS}h · ${numCat}/${MIN_CATEGORIAS} categorias ${ok ? '· <b style="color:var(--verde-medio)">Requisitos atingidos</b>' : ''}</p>
        </div>
        <button class="btn btn-danger btn-sm" data-key="${key}" data-nome="${sub.nome.replace(/"/g,'&quot;')}">Excluir aluno</button>
      </div>
      <div class="bar-track"><div class="bar-fill ${ok?'ok':''}" style="width:${pct}%"></div></div>
    `;
    wrap.appendChild(card);
  });

  wrap.querySelectorAll('button[data-key]').forEach(b => {
    b.onclick = async () => {
      const confirmado = confirm(`Excluir todas as atividades de "${b.dataset.nome}"? Essa ação não pode ser desfeita.`);
      if(!confirmado) return;
      const key = b.dataset.key;
      const alvo = state.submissoes.filter(s => alunoKey(s) === key);
      try{
        b.disabled = true; b.textContent = 'Excluindo...';
        for(const s of alvo){
          await db.collection('submissoes').doc(s.id).delete();
          if(s.pdfUrl){
            try{ await fbStorage.refFromURL(s.pdfUrl).delete(); }catch(e){}
          }
        }
        showToast('Aluno e suas atividades foram excluídos.');
        setState({loading:true});
        await loadSubmissoes();
      }catch(e){
        console.error(e);
        showToast('Erro ao excluir. Tente novamente.');
      }
    };
  });

  return wrap;
}

function renderModal(){
  const item = state.modalItem;
  const bg = document.createElement('div');
  bg.className='modal-bg';
  bg.onclick = (e) => { if(e.target === bg) setState({modalItem:null}); };

  const modal = document.createElement('div');
  modal.className='modal';
  modal.innerHTML = `
    <h3>${item.tema}</h3>
    <div class="field-view"><b>Aluno</b> ${item.nome} (${item.matricula})</div>
    <div class="field-view"><b>Tipo</b> ${item.tipo}</div>
    <div class="field-view"><b>Período</b> ${item.dataIni} a ${item.dataFim}</div>
    <div class="field-view"><b>Local</b> ${item.local}</div>
    <div class="field-view"><b>Carga solicitada</b> ${item.cargaHoraria}h</div>
    <div class="field-view"><b>Status atual</b> <span class="badge badge-${item.status}">${item.status}</span></div>

    ${item.pdfUrl ? `
    <div class="pdf-header">
      <span class="pdf-filename">📄 ${item.pdfName}</span>
      <a class="dl-icon" href="${item.pdfUrl}" download="${item.pdfName}" target="_blank" title="Baixar PDF">⬇</a>
    </div>
    <iframe class="pdf-frame" src="${item.pdfUrl}"></iframe>
    ` : `<div class="small-note" style="margin-top:14px">Sem PDF anexado (registro importado de planilha).</div>`}

    <div style="margin-top:18px">
      <label>Carga horária reconhecida</label>
      <input id="m-carga" type="number" value="${state.modalCargaReconhecida}" min="0">
      <label>Motivo (necessário se recusar)</label>
      <textarea id="m-motivo" rows="2" placeholder="Ex: documento ilegível, carga horária divergente...">${state.modalMotivo}</textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="m-fechar">Fechar</button>
      <button class="btn btn-danger btn-sm" id="m-recusar">Recusar</button>
      <button class="btn btn-gold btn-sm" id="m-aprovar">Aprovar</button>
    </div>
  `;
  bg.appendChild(modal);

  modal.querySelector('#m-fechar').onclick = () => setState({modalItem:null});
  modal.querySelector('#m-carga').oninput = (e) => { state.modalCargaReconhecida = e.target.value; };
  modal.querySelector('#m-motivo').oninput = (e) => { state.modalMotivo = e.target.value; };

  modal.querySelector('#m-aprovar').onclick = async () => {
    const carga = Number(modal.querySelector('#m-carga').value);
    const btnAprovar = modal.querySelector('#m-aprovar');
    btnAprovar.disabled = true; btnAprovar.textContent = 'Aprovando...';

    await atualizarSubmissao(item.id, {status:'aprovado', cargaReconhecida: carga, motivoRecusa:''});

    // Tentar enviar PDF ao Google Drive se houver PDF e token disponível
    if(item.pdfUrl){
      if(!driveAccessToken){
        // Solicitar autorização e aguardar token
        if(driveTokenClient){
          driveTokenClient.requestAccessToken();
          // Aguardar até 10s pelo token, então tentar upload
          await new Promise(resolve => {
            let tentativas = 0;
            const check = setInterval(async () => {
              tentativas++;
              if(driveAccessToken){
                clearInterval(check);
                const ok = await uploadPdfToDrive(item.pdfUrl, item.nome, item.pdfName);
                if(ok) showToast('Atividade aprovada e PDF enviado para o Drive.');
                else showToast('Atividade aprovada. Falha ao enviar pro Drive.');
                resolve();
              } else if(tentativas > 20){
                clearInterval(check);
                showToast('Atividade aprovada. Drive não autorizado, PDF não enviado.');
                resolve();
              }
            }, 500);
          });
        } else {
          showToast('Atividade aprovada. Configure o Google Drive nas credenciais para envio automático.');
        }
      } else {
        const ok = await uploadPdfToDrive(item.pdfUrl, item.nome, item.pdfName);
        if(ok) showToast('Atividade aprovada e PDF enviado para o Drive.');
        else showToast('Atividade aprovada. Falha ao enviar pro Drive — tente novamente.');
      }
    } else {
      showToast('Atividade aprovada (sem PDF anexado).');
    }

    setState({modalItem:null, loading:true});
    await loadSubmissoes();
  };
  modal.querySelector('#m-recusar').onclick = async () => {
    const motivo = modal.querySelector('#m-motivo').value.trim();
    if(!motivo){ alert('Informe o motivo da recusa.'); return; }
    await atualizarSubmissao(item.id, {status:'recusado', motivoRecusa: motivo});
    showToast('Atividade recusada.');
    setState({modalItem:null, loading:true});
    await loadSubmissoes();
  };

  return bg;
}

render();
</script>
